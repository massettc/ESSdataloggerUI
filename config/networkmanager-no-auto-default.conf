[main]
# no-auto-default intentionally removed.
#
# The previous "no-auto-default=*" prevented NM from auto-activating ANY
# connection on ANY interface, which meant eth0 never reconnected after reboot
# even with autoconnect=yes set on the profile.
#
# Unwanted auto-generated "Wired Connection N" / "Ethernet Connection N"
# profiles are handled by install.sh step 3b, which deletes them on every
# install/update run.
